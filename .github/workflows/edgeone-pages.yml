# Deploy full-stack Next.js to Tencent EdgeOne Pages.
# Docs: https://pages.edgeone.ai/document/api-token
#
# GitHub - Settings - Secrets and variables - Actions:
#   EDGEONE_API_TOKEN       - required
#   EDGEONE_PAGES_PROJECT   - required (exact Pages project name)
#   EDGEONE_DEPLOY_AREA     - optional: global | overseas (default global)
#
# CLI constraint: existing project must be "direct upload" type (not Git-import-only).

name: Deploy EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: edgeone-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.EDGEONE_API_TOKEN }}" ]; then echo "Missing secret EDGEONE_API_TOKEN"; exit 1; fi
          if [ -z "${{ secrets.EDGEONE_PAGES_PROJECT }}" ]; then echo "Missing secret EDGEONE_PAGES_PROJECT"; exit 1; fi

      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PAGES_PROJECT: ${{ secrets.EDGEONE_PAGES_PROJECT }}
          EDGEONE_DEPLOY_AREA: ${{ secrets.EDGEONE_DEPLOY_AREA }}
        run: |
          set -euo pipefail
          AREA="${EDGEONE_DEPLOY_AREA:-global}"
          npx --yes edgeone@latest pages deploy \
            -n "$EDGEONE_PAGES_PROJECT" \
            -t "$EDGEONE_API_TOKEN" \
            -a "$AREA"
